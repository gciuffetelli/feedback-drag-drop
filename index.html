<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Feedback Critique – Drag & Drop</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<main class="container">
  <h1>Evaluate the Feedback</h1>

  <p class="instructions">
    Read the feedback below. Drag each label into the box where it belongs.
  </p>

  <div id="counter"></div>

  <section id="feedbackText" class="feedback-text"></section>

  <section id="dragItems" class="drag-items"></section>

  <section class="drop-zones">
    <div class="drop-zone" data-zone="present">
      <h2>Issues Present</h2>
    </div>

    <div class="drop-zone" data-zone="not-present">
      <h2>Issues NOT Present</h2>
    </div>
  </section>

  <div class="controls">
    <button id="checkAnswers">Check Answers</button>
    <button id="nextItem" disabled>Next</button>
  </div>

  <section id="feedback" class="feedback hidden"></section>
</main>

<script src="script.js"></script>
</body>
</html>
